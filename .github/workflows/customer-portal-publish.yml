name: Labs64.IO - Customer Portal - Publish Docker

# Publishes the Customer Portal UI image to Docker Hub on GitHub Release:
#   * customer-portal-fe -> labs64/customer-portal-ui  (matches the Helm chart repository)
#
# Docker Hub auth uses DOCKERHUB_USERNAME / DOCKERHUB_TOKEN.
# To also push to Artifactory later, enable the commented "Login to Artifactory"
# step and add the registry host to the `tags:` of the build-push step.

permissions:
  contents: read
  packages: write

on:
  release:
    types: [created]

jobs:
  publish-fe:
    name: Build & Push UI image (labs64/customer-portal-ui)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # - name: Login to Artifactory
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ${{ vars.ARTIFACTORY_REGISTRY }}
      #     username: ${{ secrets.L64_PUB_CI_USERNAME }}
      #     password: ${{ secrets.L64_PUB_CI_PASSWORD }}

      - name: Get release tag name
        id: get_release_tag
        run: echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # The customer-portal-fe Dockerfile is a self-contained multi-stage build.
      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: ./customer-portal-fe
          push: true
          platforms: linux/amd64,linux/arm64/v8
          tags: |
            labs64/customer-portal-ui:latest
            labs64/customer-portal-ui:${{ steps.get_release_tag.outputs.RELEASE_TAG }}
          cache-from: type=gha,scope=${{ github.workflow }}-fe
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-fe
