name: Labs64.IO - Customer Portal - Publish Docker

on:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  publish:
    uses: Labs64/labs64.io-workspace/.github/workflows/docker-publish.yml@master
    with:
      image: labs64/customer-portal-ui
      context: ./customer-portal-fe
      mode: release
      version: ${{ github.event.release.tag_name }}
    secrets: inherit
