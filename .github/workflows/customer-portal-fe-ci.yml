name: Labs64.IO - Customer Portal UI - CI

on:
  push:
    branches: [ "master" ]
    paths:
      - "customer-portal-fe/**"
      - ".github/workflows/customer-portal-fe-ci.yml"
  pull_request:
    paths:
      - "customer-portal-fe/**"
      - ".github/workflows/customer-portal-fe-ci.yml"
  workflow_dispatch:

concurrency:
  group: customer-portal-fe-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    uses: Labs64/labs64.io-workspace/.github/workflows/vue-ci.yml@master
    with:
      working-directory: customer-portal-fe
      lint-command: npx eslint .
      test-command: npx vitest run
      upload-dist: true

  edge-image:
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    uses: Labs64/labs64.io-workspace/.github/workflows/docker-publish.yml@master
    with:
      image: labs64/customer-portal-ui
      context: ./customer-portal-fe
      mode: edge
    secrets: inherit
